<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Signup</h2>

    <form id="signupForm">
        <input type="text" placeholder="Username" id="signupUser" required>
        <input type="password" placeholder="Password" id="signupPass" required>
        <button type="submit">Signup</button>
    </form>

    <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
